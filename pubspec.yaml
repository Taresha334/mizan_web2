name: mizan_web
description: "Official application for MIZAN Animals Feed Processing PLC"
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^6.2.1 
  font_awesome_flutter: ^10.12.0 
  carousel_slider: ^5.0.0
  lottie: ^3.1.2
  flutter_markdown: ^0.7.3
  supabase_flutter: ^2.8.1
  supabase: ^2.3.1
  go_router: ^14.8.1 
  google_generative_ai: ^0.4.7
  flutter_map_marker_popup: ^7.0.0
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geocoding: ^3.0.0
  geolocator: ^13.0.4
  provider: ^6.1.2
  url_launcher: ^6.3.0 
  share_plus: ^10.1.4 
  http: ^1.2.1
  http_parser: ^4.0.0
  shared_preferences: ^2.5.2 
  image_picker: ^1.1.2 
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.2
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.2
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  permission_handler: ^11.3.1 
  flutter_local_notifications: ^18.0.1
  flutter_sms_inbox: ^1.0.4
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/logos/
    - assets/images/patterns/
    - assets/images/categories/
    - assets/fonts/
  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700